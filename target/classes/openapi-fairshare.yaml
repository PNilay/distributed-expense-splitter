components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          format: int64

        name:
          type: string

        email:
          type: string

    CreateUserRequest:
      type: object

      required:
        - name
        - email

      properties:
        name:
          type: string

        email:
          type: string

    Group:
      type: object

      properties:
        id:
          type: integer
          format: int64

        name:
          type: string

        description:
          type: string

    CreateGroupRequest:
      type: object

      required:
        - name

      properties:
        name:
          type: string

        description:
          type: string

    AddMemberRequest:
      type: object

      required:
        - userId

      properties:
        userId:
          type: integer
          format: int64

    CreateExpenseRequest:
      type: object

      required:
        - groupId
        - paidBy
        - amount

      properties:
        groupId:
          type: integer
          format: int64

        paidBy:
          type: integer
          format: int64

        description:
          type: string

        amount:
          type: number
          format: double
