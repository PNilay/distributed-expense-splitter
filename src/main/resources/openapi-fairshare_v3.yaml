openapi: 3.0.3

info:
  title: Expense Splitter API
  version: 1.3.0
  description: API for managing users, groups, expenses and balances.

servers:
  - url: http://localhost:8080

tags:
  - name: Welcome
  - name: Users
  - name: Groups
  - name: Expenses
  - name: Balances

paths:
  /welcome:
    get:
      tags:
        - Welcome
      summary: Welcome endpoint
      operationId: getWelcomeMessage

      responses:
        "200":
          description: Welcome message

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WelcomeResponse"

  /users:
    post:
      tags:
        - Users
      summary: Create User
      operationId: createUser

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"

      responses:
        "201":
          description: User created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDTO"

    get:
      tags:
        - Users
      summary: Get All Users
      operationId: getUsers

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/UserDTO"

  /users/{userId}:
    get:
      tags:
        - Users
      summary: Get User
      operationId: getUser

      parameters:
        - name: userId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDTO"

    put:
      tags:
        - Users
      summary: Update User
      operationId: updateUser

      parameters:
        - name: userId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"

      responses:
        "200":
          description: Updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDTO"

    delete:
      tags:
        - Users
      summary: Delete User
      operationId: deleteUserById

      parameters:
        - name: userId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "204":
          description: Deleted
  /users/{userId}/related:
    get:
      tags:
        - Users
      summary: Get Related Users
      description: Returns distinct users sharing a group or an individual expense split context with the target user.
      operationId: getRelatedUsers
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RelatedUserDTO"

  /users/{userId}/activity:
    get:
      tags:
        - Welcome
      summary: Get User Activity Feed
      description: Returns a paginated transactional audit log stream detailing actions, creations, adjustments, and updates related to this user's network profile.
      operationId: getUserActivityFeed
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPageDTO"

  /users/{userId}/balance-summary:
    get:
      tags:
        - Balances
      summary: Get User's Global Balance Summary
      description: Returns a macro summary of what the user overall owes, is owed, and their net financial standing across all individual and group metrics.
      operationId: getUserBalanceSummary
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBalanceSummaryDTO"

  /groups:
    post:
      tags:
        - Groups
      summary: Create Group
      operationId: createGroup

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"

      responses:
        "201":
          description: Group created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDTO"

    get:
      tags:
        - Groups
      summary: Get Groups
      operationId: getGroups

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/GroupDTO"

  /groups/{groupId}:
    get:
      tags:
        - Groups
      summary: Get Group
      operationId: getGroup

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDTO"

    put:
      tags:
        - Groups
      summary: Update Group
      operationId: updateGroup

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"

      responses:
        "200":
          description: Updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupDTO"

    delete:
      tags:
        - Groups
      summary: Delete Group
      operationId: deleteGroup

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "204":
          description: Deleted

  /groups/{groupId}/members:
    post:
      tags:
        - Groups
      summary: Add Member
      operationId: addMember

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"

      responses:
        "204":
          description: Added

    get:
      tags:
        - Groups
      summary: Get Group Members
      operationId: getGroupMembers

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/UserDTO"

  /groups/{groupId}/members/{userId}:
    delete:
      tags:
        - Groups
      summary: Remove Member
      operationId: removeMember

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

        - name: userId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "204":
          description: Removed

  /expenses:
    post:
      tags:
        - Expenses
      summary: Create Expense
      operationId: createExpense

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseRequest"

      responses:
        "201":
          description: Expense created

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDTO"

    get:
      tags:
        - Expenses
      summary: Get Expenses
      operationId: getExpenses

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/ExpenseDTO"

  /groups/{groupId}/simplified-debts:
    get:
      tags:
        - Balances
      summary: Get Simplified Group Debts
      description: Computes and returns the optimized, minimized payment transactions needed to completely settle the entire group's net standing.
      operationId: getSimplifiedDebts
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptimizedTransactionDTO"

  /expenses/{expenseId}:
    get:
      tags:
        - Expenses
      summary: Get Expense
      operationId: getExpense

      parameters:
        - name: expenseId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDTO"

    put:
      tags:
        - Expenses
      summary: Update Expense
      operationId: updateExpense

      parameters:
        - name: expenseId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      requestBody:
        required: true

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseRequest"

      responses:
        "200":
          description: Updated

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDTO"

    delete:
      tags:
        - Expenses
      summary: Delete Expense
      operationId: deleteExpense

      parameters:
        - name: expenseId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "204":
          description: Deleted

  /expenses/group/{groupId}:
    get:
      tags:
        - Expenses
      summary: Get Group Expenses
      operationId: getGroupExpenses

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                type: array

                items:
                  $ref: "#/components/schemas/ExpenseDTO"
  /expenses/user/{userId}:
    get:
      tags:
        - Expenses
      summary: Get Paginated Expenses for User
      description: Fetches a combined list of individual (non-group) and group expenses where the user is either the payer or a participant in the split list.
      operationId: getUserExpensesPaginated
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          required: false
          description: Zero-indexed page number
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: Size of page payload allocation
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpensePageDTO"

  /expenses/settle:
    post:
      tags:
        - Expenses
      summary: Record a settlement payment
      description: Logs a peer-to-peer payment transaction (e.g., Cash, Venmo, PayPal) to clear or reduce balances between two specific users.
      operationId: settleDebt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementRequest"
      responses:
        "201":
          description: Settlement recorded successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExpenseDTO"

  /groups/{groupId}/balances:
    get:
      tags:
        - Balances
      summary: Get Group Balances
      operationId: getGroupBalances

      parameters:
        - name: groupId
          in: path
          required: true

          schema:
            type: integer
            format: int64

      responses:
        "200":
          description: Success

          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupBalanceResponse"

components:
  schemas:
    WelcomeResponse:
      type: object

      properties:
        message:
          type: string
          example: Welcome to Expense Splitter API

    UserStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE

    UserDTO:
      type: object

      properties:
        id:
          type: integer
          format: int64

        name:
          type: string

        email:
          type: string
          format: email

        status:
          $ref: "#/components/schemas/UserStatus"

        createdAt:
          type: string
          format: date-time

        updatedAt:
          type: string
          format: date-time

    CreateUserRequest:
      type: object

      required:
        - name
        - email

      properties:
        name:
          type: string
          minLength: 2 # Automatically generates @Size(min = 2)
          maxLength: 50 # Automatically generates @Size(max = 50)
          pattern: "^[a-zA-Z\\s'’-]+$"

        email:
          type: string
          format: email

    UpdateUserRequest:
      type: object

      properties:
        name:
          type: string
          minLength: 2 # Automatically generates @Size(min = 2)
          maxLength: 50 # Automatically generates @Size(max = 50)
          pattern: "^[a-zA-Z\\s'’-]+$"

        email:
          type: string
          format: email

    GroupStatus:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED

    GroupDTO:
      type: object

      properties:
        id:
          type: integer
          format: int64

        name:
          type: string

        icon:
          type: string

        description:
          type: string

        createdBy:
          type: integer
          format: int64

        status:
          $ref: "#/components/schemas/GroupStatus"

        createdAt:
          type: string
          format: date-time

    CreateGroupRequest:
      type: object

      required:
        - name
        - createdBy

      properties:
        name:
          type: string
          minLength: 2 # Automatically generates @Size(min = 2)
          maxLength: 50 # Automatically generates @Size(max = 50)
          pattern: "^[a-zA-Z\\s'’-]+$"

        description:
          type: string

        icon:
          type: string

        createdBy:
          type: integer
          format: int64

    AddMemberRequest:
      type: object

      required:
        - userId

      properties:
        userId:
          type: integer
          format: int64

    ExpenseCategory:
      type: string

      enum:
        - FOOD
        - TRAVEL
        - RENT
        - UTILITIES
        - SHOPPING
        - OTHER
    SplitType:
      type: string

      enum:
        - EQUAL
        - EXACT
        - PERCENTAGE
        - SHARE

    ExpenseDTO:
      type: object

      properties:
        id:
          type: integer
          format: int64

        groupId:
          type: integer
          format: int64
          # nullable: true

        paidBy:
          type: integer
          format: int64

        description:
          type: string

        amount:
          type: number
          format: double

        category:
          $ref: "#/components/schemas/ExpenseCategory"

        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "The 3-letter ISO 4217 currency code."
          example: "USD"

        notes:
          type: string

        expenseDate:
          type: string
          format: date-time

        splitType:
          $ref: "#/components/schemas/SplitType"

        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitDTO"

    ExpenseSplitDTO:
      type: object

      properties:
        userId:
          type: integer
          format: int64

        amount:
          type: number
          format: double

        percentage:
          type: number
          format: double
          writeOnly: true

        share:
          type: integer
          writeOnly: true

      required:
        - userId

      anyOf:
        - required: [amount]
        - required: [percentage]
        - required: [share]

    CreateExpenseRequest:
      type: object

      required:
        # - groupId
        - paidBy
        - amount
        - currency
        - splits
        - expenseDate
        - splitType

      properties:
        groupId:
          type: integer
          format: int64

        paidBy:
          type: integer
          format: int64

        amount:
          type: number
          format: double

        description:
          type: string

        category:
          $ref: "#/components/schemas/ExpenseCategory"

        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          description: "The 3-letter ISO 4217 currency code."
          example: "USD"

        notes:
          type: string

        expenseDate:
          type: string
          format: date-time

        splitType:
          $ref: "#/components/schemas/SplitType"

        splits:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseSplitDTO"
    UserBalance:
      type: object

      properties:
        userId:
          type: integer
          format: int64

        amount:
          type: number
          format: double

    GroupBalanceResponse:
      type: object

      properties:
        balances:
          type: array

          items:
            $ref: "#/components/schemas/UserBalance"

    RelationshipContext:
      type: string
      enum:
        - GROUP
        - INDIVIDUAL
        - BOTH

    RelatedUserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        status:
          $ref: "#/components/schemas/UserStatus"
        relationshipContext:
          $ref: "#/components/schemas/RelationshipContext"

    ExpensePageDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ExpenseDTO"
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        isLast:
          type: boolean

    SettlementRequest:
      type: object
      required:
        - fromUserId
        - toUserId
        - amount
        - currency
        - settlementDate
      properties:
        groupId:
          type: integer
          format: int64
          # nullable: true
          description: Optional field if settling a debt exclusively inside a specific group scope.
        fromUserId:
          type: integer
          format: int64
          description: The user paying back the debt (the borrower).
        toUserId:
          type: integer
          format: int64
          description: The user receiving the settlement payment (the lender).
        amount:
          type: number
          format: double
          example: 25.50
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"
          example: "USD"
        notes:
          type: string
          example: "Paid back via Venmo"
        settlementDate:
          type: string
          format: date-time

    UserBalanceSummaryDTO:
      type: object
      properties:
        totalOwedToYou:
          type: number
          format: double
          description: Cumulative positive balance sum of what others owe this user.
          example: 180.00
        totalYouOwe:
          type: number
          format: double
          description: Cumulative negative balance absolute value of what this user owes others.
          example: 45.50
        netBalance:
          type: number
          format: double
          description: Net financial standing (totalOwedToYou - totalYouOwe).
          example: 134.50

    OptimizedTransactionDTO:
      type: object
      properties:
        fromUserId:
          type: integer
          format: int64
          description: Who needs to send money.
        toUserId:
          type: integer
          format: int64
          description: Who should receive the money.
        amount:
          type: number
          format: double
          example: 15.00

    ActivityDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        actorUserId:
          type: integer
          format: int64
          description: The user who performed the action.
        description:
          type: string
          example: "John Doe added the expense 'Ski Rental' to 'Winter Trip 2026'"
        relatedGroupId:
          type: integer
          format: int64
          # nullable: true
        relatedExpenseId:
          type: integer
          format: int64
          # nullable: true
        timestamp:
          type: string
          format: date-time

    ActivityPageDTO:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ActivityDTO"
        pageNumber:
          type: integer
        pageSize:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        isLast:
          type: boolean
