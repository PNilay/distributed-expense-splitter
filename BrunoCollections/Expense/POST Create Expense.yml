info:
  name: POST Create Expense
  type: http
  seq: 1

http:
  method: post
  url: http://localhost:8080/v1/api/expenses
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "groupId": 3,
        "paidBy": 1,
        "amount": 120.00,
        "description": "Car Rental",
        "category": "TRAVEL",
        "currency": "USD",
        "notes": "SUV rental for the weekend",
        "expenseDate": "2026-06-13T16:52:21.640Z",
        "splitType": "EQUAL",
        "splits": [
          { "userId": 1, "amount": 0, "percentage": 0, "share": 0 },
          { "userId": 2, "amount": 0, "percentage": 0, "share": 0 }
        ]
      }
  auth: inherit

settings:
  encodeUrl: false
  timeout: 0
  followRedirects: true
  maxRedirects: 5
